version: 2.1

jobs:
  build:
    docker:
      - image: cimg/php:8.4-browsers
      - image: cimg/mysql:9.5.0
        environment:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_USER: admin
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_DATABASE: admin

    working_directory: ~/photos2youtube

    steps:
      - checkout
      - run:
          name: Setup environment
          command: |
            cp .env.example .env
            php artisan key:generate
            npm install cross-env

      - restore_cache:
          keys:
            - node-v1-{{ checksum "package-lock.json" }}
            - node-v1-

      - run: pwd && ls && npm install && npm run build

      - save_cache:
          paths:
            - ./node_modules
          key: node-v1-{{ checksum "package-lock.json" }}

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "composer.json" }}
            - v1-dependencies-

      - run: composer install -n --prefer-dist

      - save_cache:
          paths:
            - ./vendor
          key: v1-dependencies-{{ checksum "composer.json" }}

      - persist_to_workspace:
          root: ~/
          paths:
            - photos2youtube

  unit_test:
    working_directory: ~/photos2youtube
    docker:
      - image: cimg/php:8.4
    steps:
      - attach_workspace:
          at: ~/

      - run:
          name: Run Unit tests
          command: |
            ./vendor/bin/pest

  deploy:
    working_directory: ~/photos2youtube
    docker:
      - image: cimg/php:8.4
    steps:
      - attach_workspace:
          at: ~/
      - add_ssh_keys:
          fingerprints:
            - "${SSH_KEY_FINGERPRINT}"
      - run:
          name: Add EC2 host to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H 18.140.105.53 >> ~/.ssh/known_hosts
      - run:
          name: Deploy
          command: |
            vendor/bin/dep deploy --no-interaction

workflows:
  CI_CD:
    jobs:
      - build
      - unit_test:
          requires:
            - build
      - deploy:
          requires:
            - unit_test
          filters:
            branches:
              only: master
